<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UWIN Contact</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/Minghkldy/contact/main/queen%20profile.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pyidaungsu', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            background-color: #000;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://raw.githubusercontent.com/Minghkldy/contact-2/main/31d1871b8c106d8eab66633269c9d012.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            padding: 20px 15px; 
            perspective: 1000px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 30px 0 0 0;
            text-align: center;
            position: relative;
            background: rgba(255, 255, 255, 0.03); /* ပိုကြည်သွားစေရန် လျှော့ထားပါသည် */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .logo-section {
            margin-bottom: 25px;
            padding: 0 20px;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .logo-section img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #FFD700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
            margin-bottom: 15px;
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            font-size: 36px; 
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #FFFACD 0%, #FFD700 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px; /* စာသားအကွာအဝေးကို ဤနေရာတွင် တိုးထားပါသည် */
            transition: all 0.3s ease; 
            -webkit-text-stroke: 0.5px rgba(255, 227, 89, 0.3);
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.5);
        }

        .welcome-text {
            color: #FFEC8B;
            font-size: 14px; 
            font-weight: bold; 
            margin-bottom: 25px;
            padding: 0 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            line-height: 1.6; 
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-bottom: 30px; 
            padding: 0 20px;
        }

        .link-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05); /* ခလုတ်နောက်ခံကို ကြည်ကြည်လေးဖြစ်အောင် ပြင်ထားသည် */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 0 20px;
            min-height: 52px;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .link-card i, .link-card span:first-child {
            width: 30px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            font-size: 15px;
            font-weight: bold; 
            margin-right: 30px; 
            transition: color 0.3s ease;
        }

        /* ခလုတ်စာသားအရောင်များ */
        .game-link .link-text { color: #FFD700; } 
        .fb-link .link-text { color: #99d1ff; }   
        .viber-link .link-text { color: #d1c9ff; } 
        .tele-link .link-text { color: #a3e0ff; }  
        .line-link .link-text { color: #b2ffb2; }  
        .tip-link .link-text { color: #fff1b2; }  

        .link-card:hover .link-text {
            color: #FFFFFF !important;
        }

        .footer-banner {
            width: 100%;
            line-height: 0; 
            overflow: hidden;
        }

        .footer-banner img {
            width: 100%; 
            height: auto;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            object-fit: cover;
        }

        .fa-facebook-messenger { color: #0084ff; }
        .fa-viber { color: #7360f2; }
        .fa-telegram { color: #0088cc; }
        .fa-line { color: #00c300; }
        .fa-bullhorn { color: #ffcc00; }

        /* Responsive Adjustments for PC */
        @media (min-width: 768px) {
            .container {
                max-width: 450px;
                padding-top: 40px;
            }
            h1 { font-size: 48px; margin-bottom: 20px; }
            .welcome-text { font-size: 16px; margin-bottom: 30px; }
            .link-card { min-height: 58px; }
            .link-text { font-size: 16px; }
            .logo-section img { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-section">
        <img src="https://raw.githubusercontent.com/Minghkldy/contact/main/queen%20profile.jpg" alt="Logo">
        <h1>UWIN</h1>
        <p class="welcome-text">✨အရင်းနည်းနည်း အမြတ်များများ UWIN မှာကစား✨</p>
    </div>

    <div class="links-container">
        <a href="#" class="link-card game-link">
            <span>🎰</span>
            <span class="link-text">ဂိမ်း "Link"</span>
        </a>

        <a href="#" class="link-card fb-link">
            <i class="fab fa-facebook-messenger"></i>
            <span class="link-text">Facebook Messenger ဆက်သွယ်ရန်</span>
        </a>

        <a href="#" class="link-card viber-link">
            <i class="fab fa-viber"></i>
            <span class="link-text">Viber ဆက်သွယ်ရန်</span>
        </a>

        <a href="#" class="link-card tele-link">
            <i class="fab fa-telegram"></i>
            <span class="link-text">Telegram ဆက်သွယ်ရန်</span>
        </a>

        <a href="#" class="link-card line-link">
            <i class="fab fa-line"></i>
            <span class="link-text">LINE ဆက်သွယ်ရန်</span>
        </a>

        <a href="#" class="link-card tip-link">
            <i class="fas fa-bullhorn"></i>
            <span class="link-text">Telegram Tip Game Channel</span>
        </a>
    </div>

    <div class="footer-banner">
        <img src="https://raw.githubusercontent.com/Minghkldy/contact/main/photo_2026-04-24_08-53-27.jpg" alt="Banner">
    </div>
</div>

</body>
</html>
